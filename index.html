<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>律师 LBTI 人格测试 | 有点智能事务所</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --primary: #1D8D85;
    --primary-light: #e8f5f4;
    --bg: #F0F7F6;
    --card: #FFFFFF;
    --text: #1A1A1A;
    --sub: #666666;
    --orange: #F27B35;
    --shadow: 0 4px 20px rgba(0,0,0,0.08);
    --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 0;
  }

  #app {
    width: 100%;
    max-width: 460px;
    min-height: 100vh;
    background: var(--bg);
    position: relative;
    overflow: hidden;
  }

  /* ─── SCREENS ─── */
  .screen {
    display: none;
    width: 100%;
    min-height: 100vh;
    padding: 24px 20px 40px;
    animation: fadeIn 0.35s ease;
  }
  .screen.active { display: flex; flex-direction: column; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ─── LOGO ─── */
  .logo-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #000;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    padding: 10px 18px;
    border-radius: 12px;
    letter-spacing: 0.02em;
  }
  .logo-badge .bulb { font-size: 16px; }

  /* ─── COVER PAGE ─── */
  #cover {
    padding-top: 32px;
  }
  .cover-logo { margin-bottom: 36px; }
  .cover-main { flex: 1; display: flex; flex-direction: column; justify-content: center; }

  .cover-title {
    font-size: 52px;
    font-weight: 800;
    color: var(--text);
    line-height: 1.1;
    letter-spacing: -1px;
    margin-bottom: 4px;
  }
  .cover-title span {
    color: var(--primary);
  }
  .cover-subtitle {
    font-size: 17px;
    color: var(--sub);
    margin-bottom: 28px;
    font-weight: 400;
  }

  .cover-meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 32px;
  }
  .meta-pill {
    background: var(--primary-light);
    color: var(--primary);
    font-size: 13px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 50px;
  }

  .cover-disclaimer {
    font-size: 12px;
    color: #999;
    background: #fff;
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 32px;
    line-height: 1.6;
    border-left: 3px solid var(--primary);
  }

  /* ─── BUTTONS ─── */
  .btn-primary {
    display: block;
    width: 100%;
    background: var(--primary);
    color: #fff;
    font-size: 17px;
    font-weight: 700;
    padding: 18px;
    border-radius: 50px;
    border: none;
    cursor: pointer;
    text-align: center;
    letter-spacing: 0.04em;
    transition: transform 0.15s, opacity 0.15s;
  }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-primary:active { transform: scale(0.98); }

  .btn-outline {
    display: block;
    width: 100%;
    background: transparent;
    color: var(--primary);
    font-size: 16px;
    font-weight: 600;
    padding: 16px;
    border-radius: 50px;
    border: 2px solid var(--primary);
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    margin-top: 12px;
  }
  .btn-outline:hover { background: var(--primary-light); }

  /* ─── QUIZ PAGE ─── */
  #quiz { padding-top: 20px; }

  .quiz-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
  }
  .q-num {
    font-size: 13px;
    font-weight: 700;
    color: var(--primary);
    white-space: nowrap;
  }
  .progress-bar {
    flex: 1;
    height: 5px;
    background: #dde8e7;
    border-radius: 50px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--primary);
    border-radius: 50px;
    transition: width 0.4s ease;
  }

  .q-card {
    background: var(--card);
    border-radius: 20px;
    padding: 24px 22px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
  }
  .q-index {
    font-size: 11px;
    font-weight: 700;
    color: var(--primary);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 10px;
    opacity: 0.7;
  }
  .q-text {
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.55;
  }

  .options-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .option {
    background: var(--card);
    border: 2px solid #eaf0ef;
    border-radius: 14px;
    padding: 16px 18px;
    font-size: 15px;
    color: var(--text);
    cursor: pointer;
    line-height: 1.5;
    transition: border-color 0.15s, background 0.15s, color 0.15s;
    position: relative;
    text-align: left;
    width: 100%;
    font-family: inherit;
  }
  .option:hover {
    border-color: var(--primary);
    background: var(--primary-light);
  }
  .option.selected {
    background: var(--primary);
    border-color: var(--primary);
    color: #fff;
  }
  .option.disabled {
    pointer-events: none;
    opacity: 0.6;
  }
  .option.selected.disabled {
    opacity: 1;
  }

  /* ─── RESULT PAGE ─── */
  #result { padding-top: 28px; }

  .result-logo { margin-bottom: 24px; }

  .result-intro {
    font-size: 15px;
    color: var(--sub);
    margin-bottom: 8px;
    font-weight: 500;
  }

  .result-name {
    font-size: 34px;
    font-weight: 800;
    color: var(--text);
    line-height: 1.15;
    margin-bottom: 6px;
    letter-spacing: -0.5px;
  }
  .result-name .en {
    color: var(--primary);
  }
  .result-name .zh {
    font-size: 20px;
    font-weight: 700;
    color: var(--sub);
    display: block;
    margin-top: 4px;
    letter-spacing: 0;
  }

  .tags-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 18px 0 24px;
  }
  .tag-pill {
    background: var(--primary);
    color: #fff;
    font-size: 12px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 50px;
    letter-spacing: 0.02em;
  }

  .result-section {
    background: var(--card);
    border-radius: 20px;
    padding: 22px 20px;
    box-shadow: var(--shadow-sm);
    margin-bottom: 14px;
  }
  .section-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--primary);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 14px;
    opacity: 0.8;
  }
  .section-body {
    font-size: 15px;
    color: var(--text);
    line-height: 1.75;
  }

  .scene-list, .tip-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .scene-list li, .tip-list li {
    font-size: 15px;
    color: var(--text);
    line-height: 1.6;
    padding-left: 22px;
    position: relative;
  }
  .scene-list li::before {
    content: '';
    position: absolute;
    left: 0;
    top: 8px;
    width: 8px;
    height: 8px;
    background: var(--primary);
    border-radius: 50%;
  }
  .tip-list li::before {
    content: '';
    position: absolute;
    left: 0;
    top: 8px;
    width: 8px;
    height: 8px;
    background: var(--orange);
    border-radius: 50%;
  }

  .result-footer {
    text-align: center;
    font-size: 12px;
    color: #aaa;
    margin-top: 20px;
    padding-bottom: 10px;
    line-height: 1.8;
  }

  @media (min-width: 460px) {
    body { padding: 20px; }
    #app {
      border-radius: 24px;
      min-height: auto;
      box-shadow: 0 8px 40px rgba(0,0,0,0.12);
      overflow: hidden;
    }
    .screen { min-height: 700px; }
  }
</style>
</head>
<body>
<div id="app">

  <!-- ══════════════ COVER ══════════════ -->
  <div id="cover" class="screen active">
    <div class="cover-logo">
      <div class="logo-badge"><span class="bulb">💡</span>有点智能事务所</div>

    </div>
    <div class="result-section">
      <div class="section-title">常见场景</div>
      <ul class="scene-list" id="r-scenes"></ul>
    </div>
    <div class="result-section">
      <div class="section-title">友情提示</div>
      <ul class="tip-list" id="r-tips"></ul>
    </div>
    <button class="btn-primary" onclick="restartQuiz()" style="margin-top:8px">再测一次</button>
    <div class="result-footer">有点智能事务所 出品 | 仅供娱乐<br>本 AI 保留对一切异议的驳回权利</div>
  </div>

</div>

    text: '接了个案子，对方是家看起来还运营着的公司，当事人说「欠了快二十万」。你会第一时间做什么？',
    options: [
      { text: '先查一下对方的工商信息和可执行财产，再决定策略。', tag: 'CASE_CLOSED' },
      { text: '整理证据材料，先写律师函，看对方什么反应。', tag: 'IGNORED_LETTER' },
      { text: '翻数据库找同类型欠款纠纷的胜诉判例，先做好法律依据储备。', tag: 'NO_PRECEDENT' },
      { text: '多问几句：合同签的什么？对方有没有过付款行为？欠款有没有书面确认？', tag: 'HIDDEN_FACTS' }
    ]
  }
];

// ══════════════════════════════════════
// 状态
// ══════════════════════════════════════
let scores = {};
let currentQ = 0;
let answered = false;

function initScores() {
  scores = {};
  Object.keys(PERSONAS).forEach(k => scores[k] = 0);
}

// ══════════════════════════════════════
// 屏幕切换
// ══════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ══════════════════════════════════════
// 开始测试
// ══════════════════════════════════════
function startQuiz() {
  initScores();
  currentQ = 0;
  showScreen('quiz');
  renderQuestion();
}

// ══════════════════════════════════════
// 渲染题目
// ══════════════════════════════════════
function renderQuestion() {
  const q = QUESTIONS[currentQ];
  const total = QUESTIONS.length;

  document.getElementById('q-num').textContent = `${currentQ + 1} / ${total}`;
  document.getElementById('q-index').textContent = `Q${String(currentQ + 1).padStart(2,'0')}`;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('progress-fill').style.width = `${((currentQ) / total) * 100}%`;

  const list = document.getElementById('options-list');
  list.innerHTML = '';
  answered = false;

  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.textContent = opt.text;
    btn.addEventListener('click', () => selectOption(btn, opt.tag, i));
    list.appendChild(btn);
  });
}

// ══════════════════════════════════════
// 选择选项
// ══════════════════════════════════════
function selectOption(btn, tag, idx) {
  if (answered) return;
  answered = true;

  // 视觉反馈
  document.querySelectorAll('.option').forEach(b => b.classList.add('disabled'));
  btn.classList.add('selected');

  // 计分
  scores[tag] = (scores[tag] || 0) + 1;

  // 300ms 后跳下一题
  setTimeout(() => {
    currentQ++;
    if (currentQ >= QUESTIONS.length) {
      showResult();
    } else {
      renderQuestion();
    }
  }, 300);
}

// ══════════════════════════════════════
// 计算并展示结果
// ══════════════════════════════════════
function showResult() {
  // 找得分最高的标签
  let topTag = null;
  let topScore = -1;
  Object.keys(scores).forEach(k => {
    if (scores[k] > topScore) {
      topScore = scores[k];
      topTag = k;
    }
  });

  const p = PERSONAS[topTag];

  document.getElementById('r-en').textContent = p.en;
  document.getElementById('r-zh').textContent = p.zh;

  // 标签pills
  const tagsEl = document.getElementById('r-tags');
  tagsEl.innerHTML = '';
  p.tags.forEach(t => {
    const span = document.createElement('span');
    span.className = 'tag-pill';
    span.textContent = t;
    tagsEl.appendChild(span);
  });

  // 分析
  document.getElementById('r-analysis').textContent = p.analysis;

  // 常见场景
  const scenesEl = document.getElementById('r-scenes');
  scenesEl.innerHTML = '';
  p.scenes.forEach(s => {
    const li = document.createElement('li');
    li.textContent = s;
    scenesEl.appendChild(li);
  });

  // 友情提示
  const tipsEl = document.getElementById('r-tips');
  tipsEl.innerHTML = '';
  p.tips.forEach(t => {
    const li = document.createElement('li');
    li.textContent = t;
    tipsEl.appendChild(li);
  });

  // 进度条满
  document.getElementById('progress-fill').style.width = '100%';

  showScreen('result');
  // 滚到顶部
  document.getElementById('app').scrollTop = 0;
  window.scrollTo(0, 0);
}

// ══════════════════════════════════════
// 重新测试
// ══════════════════════════════════════
function restartQuiz() {
  showScreen('cover');
}
</script>
